<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="TaeeunKil의 개발, 배움, 생각을 기록하는 개인 웹사이트입니다.">
  <meta name="theme-color" content="#f2f1ed">
  <title>TaeeunKil</title>
  <link rel="preload" href="assets/fonts/PretendardVariable.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#content">본문으로 건너뛰기</a>

  <div class="shell">
    <header class="site-header">
      <a class="logo" href="#home" data-tab-link="home" aria-label="홈으로 이동">
        TK<span aria-hidden="true">.</span>
      </a>

      <nav class="tabs" aria-label="주요 메뉴">
        <a href="#home" data-tab-link="home">홈</a>
        <a href="#writing" data-tab-link="writing">글</a>
        <a href="#about" data-tab-link="about">소개</a>
      </nav>

      <a class="github-link" href="https://github.com/TaeeunKil">GitHub ↗</a>
    </header>

    <main class="viewport" id="content">
      <div class="panel-track">
        <section class="panel home-panel" id="home" data-panel="home" aria-labelledby="home-title">
          <div class="home-meta">
            <span>Personal website</span>
            <span>Seoul · 2026</span>
          </div>

          <h1 id="home-title">
            <span>Taeeun</span><span>Kil<i aria-hidden="true">.</i></span>
          </h1>

          <p class="home-intro">개발하며 배우고, 오래 남기고 싶은 것을 씁니다.</p>
        </section>

        <section class="panel writing-panel" id="writing" data-panel="writing" aria-labelledby="writing-title">
          <header class="panel-heading">
            <p>01 / Writing</p>
            <h2 id="writing-title">글</h2>
          </header>

          <div class="post-list" aria-live="polite">
            <div class="post-row empty-row">
              <span class="post-number">001</span>
              <time datetime="2026-07-22">2026.07.22</time>
              <div>
                <h3>첫 글을 준비하고 있습니다.</h3>
                <p>완성된 생각보다 배우는 과정을 남기겠습니다.</p>
              </div>
              <span class="post-arrow" aria-hidden="true">→</span>
            </div>
          </div>
        </section>

        <section class="panel about-panel" id="about" data-panel="about" aria-labelledby="about-title">
          <header class="panel-heading">
            <p>02 / About</p>
            <h2 id="about-title">소개</h2>
          </header>

          <div class="about-keywords" aria-label="TaeeunKil을 소개하는 키워드">
            <p><span>01</span>SSAFY 13기</p>
            <p><span>02</span>대전</p>
            <p><span>03</span>물리학과</p>
            <p><span>04</span>충남대학교</p>
            <p><span>05</span>power21</p>
          </div>

          <a class="about-link" href="https://github.com/TaeeunKil">GitHub ↗</a>
        </section>
      </div>
    </main>

    <footer class="status-bar">
      <p><span class="status-dot" aria-hidden="true"></span><span id="current-label">Home</span></p>
      <p>HTML · CSS · 2 KB JS</p>
    </footer>
  </div>
</body>
</html>
